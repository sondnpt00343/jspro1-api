services:
  postgres-test:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: blog_test
      POSTGRES_PASSWORD: blog_test
      POSTGRES_DB: jspro1_api_test
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_test -d jspro1_api_test"]
      interval: 3s
      timeout: 5s
      retries: 30
