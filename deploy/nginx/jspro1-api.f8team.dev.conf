# Template only. Replace certificate placeholders in the private server config.
server {
    server_name jspro1-api.f8team.dev;

    real_ip_header CF-Connecting-IP;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    location / {
        proxy_pass http://127.0.0.1:4101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate <fullchain_path>;
    ssl_certificate_key <certificate_key_path>;
    include <ssl_options_path>;
    ssl_dhparam <ssl_dhparam_path>;
}

server {
    if ($host = jspro1-api.f8team.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name jspro1-api.f8team.dev;
    return 404; # managed by Certbot
}
